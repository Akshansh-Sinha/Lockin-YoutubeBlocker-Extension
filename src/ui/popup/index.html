<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusedTube</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="popup">
    <h1>FocusedTube</h1>

    <div id="firstRunSetup" style="display: none;">
      <p>Set your password to use FocusedTube.</p>
      <input id="setupPassword" type="password" placeholder="Password (min 8 chars)" />
      <input id="setupPasswordConfirm" type="password" placeholder="Confirm password" />
      <button id="setupBtn" class="btn btn-primary">Set up</button>
    </div>

    <div id="mainUI" style="display: none;">
      <div class="section">
        <h2>Whitelisted videos</h2>
        <div id="videoList" class="list"></div>
      </div>

      <div class="section">
        <h2>Whitelisted playlists</h2>
        <div id="playlistList" class="list"></div>
      </div>

      <div class="section">
        <h3>Add by URL</h3>
        <input id="urlInput" type="text" placeholder="Paste YouTube URL" />
        <button id="addUrlBtn" class="btn btn-small">Extract & add</button>
      </div>

      <div class="section">
        <h3>Unlock</h3>
        <div class="unlock-presets">
          <button class="btn btn-preset" data-minutes="10">10 min</button>
          <button class="btn btn-preset" data-minutes="20">20 min</button>
          <button class="btn btn-preset" data-minutes="30">30 min</button>
        </div>
        <p id="unlockStatus" class="status"></p>
      </div>
    </div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
