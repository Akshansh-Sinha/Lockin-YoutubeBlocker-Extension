<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusedTube</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1 class="title">FocusedTube</h1>
      <p class="subtitle">Only the links you choose.</p>
    </div>

    <div id="firstRunSetup" style="display: none;" class="setup-section">
      <h2>Set password</h2>
      <p class="setup-description">Protect your whitelist and override settings.</p>
      <input id="setupPassword" type="password" placeholder="Password (min 8 chars)" class="input-field" />
      <input id="setupPasswordConfirm" type="password" placeholder="Confirm password" class="input-field" />
      <button id="setupBtn" class="btn btn-primary btn-full">Set up</button>
    </div>

    <div id="mainUI" style="display: none;">
      <div class="section">
        <div class="section-header">
          <h2>Videos</h2>
          <span class="count" id="videoCount">0</span>
        </div>
        <div id="videoList" class="list">
          <p class="empty-state">No videos whitelisted yet</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>Playlists</h2>
          <span class="count" id="playlistCount">0</span>
        </div>
        <div id="playlistList" class="list">
          <p class="empty-state">No playlists whitelisted yet</p>
        </div>
      </div>

      <div class="section">
        <h3>Add link</h3>
        <input id="nameInput" type="text" placeholder="Name (optional)" class="input-field" />
        <div class="input-group">
          <input id="urlInput" type="text" placeholder="Paste YouTube URL" class="input-field" />
          <button id="addUrlBtn" class="btn btn-small">Add</button>
        </div>
      </div>

      <div class="section unlock-section">
        <h3>Temporary unlock</h3>
        <div class="unlock-presets">
          <button class="btn btn-preset" data-minutes="2">2 min</button>
          <button class="btn btn-preset" data-minutes="5">5 min</button>
          <button class="btn btn-preset" data-minutes="10">10 min</button>
          <button class="btn btn-preset" data-minutes="30">30 min</button>
        </div>
        <p id="unlockStatus" class="unlock-status"></p>
      </div>
    </div>
  </div>

  <script src="./popup.ts" type="module"></script>
</body>
</html>
