<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusedTube — Access Restricted</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 550px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.3);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .icon-container svg {
      width: 60px;
      height: 60px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.6s ease-out;
      margin-bottom: 20px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reason-section {
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 2px solid #f0f0f0;
    }

    .reason-label {
      font-size: 12px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .reason-text {
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
      line-height: 1.5;
    }

    .url-section {
      background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
      border-left: 4px solid #667eea;
    }

    .url-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .url-text {
      font-size: 13px;
      color: #555;
      font-family: 'SF Mono', Monaco, 'Cascade Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
      word-break: break-all;
      line-height: 1.6;
      letter-spacing: -0.3px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-back {
      background: #f0f0f0;
      color: #333;
      grid-column: 1;
    }

    .btn-back:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .btn-add {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      grid-column: 2;
    }

    .btn-add:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(102, 126, 234, 0.3);
    }

    .btn-add:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .add-full {
      grid-column: 1 / -1;
    }

    .success-banner {
      display: none;
      background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
      color: white;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideDown 0.4s ease-out;
    }

    .success-banner.show {
      display: flex;
    }

    .success-banner svg {
      flex-shrink: 0;
    }

    .info-box {
      background: #fffbea;
      border: 2px solid #ffe0b2;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    .info-box strong {
      color: #f57c00;
      font-weight: 700;
    }

    .debug-section {
      margin-top: 20px;
    }

    .debug-section details {
      background: #f9f9f9;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    .debug-section summary {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
      background: #f5f5f5;
      transition: all 0.2s;
    }

    .debug-section summary:hover {
      background: #eee;
    }

    .debug-section pre {
      margin: 0;
      padding: 12px 16px;
      font-size: 11px;
      overflow-x: auto;
      color: #666;
      font-family: 'SF Mono', Monaco, 'Cascade Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .btn-back {
        grid-column: 1;
      }

      .btn-add {
        grid-column: 1;
      }

      .add-full {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon-container">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="28" stroke="#667eea" stroke-width="2.5"/>
          <path d="M30 18V42M18 30H42" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Access Restricted</h1>
      <p class="subtitle">This content is blocked by FocusedTube</p>
    </div>

    <div class="card">
      <div class="reason-section">
        <div class="reason-label">Reason</div>
        <div class="reason-text" id="reasonText">Loading...</div>
      </div>

      <div class="url-section">
        <div class="url-label">Requested URL</div>
        <div class="url-text" id="urlText">Loading...</div>
      </div>

      <div class="actions">
        <button class="btn btn-back" id="backBtn">
          <span>←</span> Go back
        </button>
        <button class="btn btn-add" id="addBtn" style="display: none;">
          <span>+</span> <span id="addBtnText">Add</span>
        </button>
      </div>

      <div class="success-banner" id="successBanner">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M17 6L8 15L3 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="successText">Added to whitelist!</span>
      </div>

      <div class="info-box">
        <strong>💡 Tip:</strong> You can manage your whitelist settings and toggle blocking from the FocusedTube extension popup.
      </div>
    </div>

    <div class="debug-section card">
      <details>
        <summary>🔍 Debug Information</summary>
        <pre id="debugInfo">{}</pre>
      </details>
    </div>
  </div>

  <script src="./block.ts" type="module"></script>
</body>
</html>
