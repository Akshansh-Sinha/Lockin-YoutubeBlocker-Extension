<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lockin - Time to Study</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #343434;
      --panel: #3c3c3c;
      --panel-soft: #454545;
      --text: #f5f2ea;
      --muted: #c8c2b6;
      --line: #565656;
      --accent: #d8d0bd;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 48px 24px;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .hero {
      padding: 9vh 0 42px;
    }

    .hero-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .analog-timer {
      width: clamp(140px, 20vw, 200px); /* slightly larger for numbers */
      height: clamp(140px, 20vw, 200px);
      flex: 0 0 auto;
      border: 6px solid var(--line);
      border-radius: 50%;
      background: var(--panel);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
    }
    
    .number {
      position: absolute;
      inset: 8px; /* Space from the edge */
      text-align: center;
      transform: rotate(var(--rotation));
      pointer-events: none;
    }

    .number span {
      display: inline-block;
      transform: rotate(calc(-1 * var(--rotation)));
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      color: var(--muted);
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
      transform: translateX(-50%) rotate(0deg);
    }
    
    .analog-timer.ticking .hand {
      transition: transform 0.1s cubic-bezier(0.4, 2.08, 0.55, 0.44); /* Bouncy tick effect */
    }

    .hour-hand {
      width: 6px;
      height: 28%;
      background: var(--text);
      border-radius: 6px;
    }

    .minute-hand {
      width: 4px;
      height: 40%;
      background: var(--accent);
      border-radius: 4px;
    }

    .second-hand {
      width: 2px;
      height: 45%;
      background: #e74c3c; /* Red color for seconds */
      border-radius: 2px;
    }

    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      z-index: 10;
      border: 2px solid var(--panel);
    }

    h1 {
      min-width: min(100%, 420px);
      max-width: 760px;
      flex: 1 1 420px;
      color: var(--text);
      font-size: clamp(56px, 10vw, 118px);
      font-weight: 720;
      line-height: 0.94;
      letter-spacing: 0;
    }

    .requested-url {
      max-width: 760px;
      margin-top: 22px;
      color: var(--muted);
      font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    td {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .link-cell {
      max-width: 430px;
    }

    a {
      display: block;
      overflow: hidden;
      color: var(--accent);
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    .empty-row td {
      color: var(--muted);
      text-align: center;
      padding: 28px 18px;
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 16px;
      }

      .hero {
        padding-top: 6vh;
      }

      .hero-title {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
      }

      .analog-timer {
        width: 100px;
        height: 100px;
        border-width: 4px;
      }

      th:nth-child(2),
      td:nth-child(2) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-title">
        <h1>Time to study</h1>
        <div class="analog-timer" id="analogTimer" aria-label="Blocker active time">
          <div class="number" style="--rotation: 30deg;"><span>1</span></div>
          <div class="number" style="--rotation: 60deg;"><span>2</span></div>
          <div class="number" style="--rotation: 90deg;"><span>3</span></div>
          <div class="number" style="--rotation: 120deg;"><span>4</span></div>
          <div class="number" style="--rotation: 150deg;"><span>5</span></div>
          <div class="number" style="--rotation: 180deg;"><span>6</span></div>
          <div class="number" style="--rotation: 210deg;"><span>7</span></div>
          <div class="number" style="--rotation: 240deg;"><span>8</span></div>
          <div class="number" style="--rotation: 270deg;"><span>9</span></div>
          <div class="number" style="--rotation: 300deg;"><span>10</span></div>
          <div class="number" style="--rotation: 330deg;"><span>11</span></div>
          <div class="number" style="--rotation: 360deg;"><span>12</span></div>
          
          <div class="hand hour-hand" id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="hand second-hand" id="secondHand"></div>
          <div class="center-dot"></div>
        </div>
      </div>
      <p class="requested-url" id="urlText"></p>
      
      <div id="provenanceContainer" style="display: none; margin-top: 24px; font-family: 'SF Mono', Consolas, 'Liberation Mono', monospace; font-size: 12px; color: var(--muted); border: 1px dashed var(--line); border-radius: 6px; padding: 16px; background: rgba(0,0,0,0.15);">
        <div style="font-weight: 600; margin-bottom: 10px; color: var(--text); letter-spacing: 0.5px; text-transform: uppercase; font-size: 11px;">Decision Trace: <span id="provenanceSource" style="color: var(--accent);"></span></div>
        <ul id="provenanceSignals" style="list-style-type: disc; margin: 0; padding-left: 18px; opacity: 0.85; line-height: 1.6;"></ul>
      </div>
    </section>

    <section class="table-wrap" aria-labelledby="whitelistTitle">
      <div class="table-header">
        <h2 id="whitelistTitle">Whitelisted links</h2>
        <span class="count" id="whitelistCount">0 links</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="whitelistTableBody">
          <tr class="empty-row">
            <td colspan="3">Loading whitelist...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="./block.ts" type="module"></script>
</body>
</html>
