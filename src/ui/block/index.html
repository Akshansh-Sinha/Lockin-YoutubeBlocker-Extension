<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusedTube - Time to Study</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #343434;
      --panel: #3c3c3c;
      --panel-soft: #454545;
      --text: #f5f2ea;
      --muted: #c8c2b6;
      --line: #565656;
      --accent: #d8d0bd;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 48px 24px;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .hero {
      padding: 9vh 0 42px;
    }

    .hero-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .block-timer {
      width: clamp(150px, 18vw, 210px);
      flex: 0 0 auto;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--accent);
      font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
      font-size: clamp(36px, 4.5vw, 60px);
      font-weight: 720;
      line-height: 1;
      text-align: center;
    }

    h1 {
      min-width: min(100%, 420px);
      max-width: 760px;
      flex: 1 1 420px;
      color: var(--text);
      font-size: clamp(56px, 10vw, 118px);
      font-weight: 720;
      line-height: 0.94;
      letter-spacing: 0;
    }

    .requested-url {
      max-width: 760px;
      margin-top: 22px;
      color: var(--muted);
      font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    td {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .link-cell {
      max-width: 430px;
    }

    a {
      display: block;
      overflow: hidden;
      color: var(--accent);
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    .empty-row td {
      color: var(--muted);
      text-align: center;
      padding: 28px 18px;
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 16px;
      }

      .hero {
        padding-top: 6vh;
      }

      .hero-title {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
      }

      .block-timer {
        width: 126px;
        padding: 11px 13px;
        font-size: 28px;
      }

      th:nth-child(2),
      td:nth-child(2) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-title">
        <h1>Time to study</h1>
        <div class="block-timer" id="blockTimer" aria-label="Blocker active time">00:00</div>
      </div>
      <p class="requested-url" id="urlText"></p>
    </section>

    <section class="table-wrap" aria-labelledby="whitelistTitle">
      <div class="table-header">
        <h2 id="whitelistTitle">Whitelisted links</h2>
        <span class="count" id="whitelistCount">0 links</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="whitelistTableBody">
          <tr class="empty-row">
            <td colspan="3">Loading whitelist...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="./block.ts" type="module"></script>
</body>
</html>
